<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>TENBOX | Delivering Choice and Efficiency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Satoshi', 'sans-serif'],
            display: ['Satoshi', 'sans-serif'],
            mono: ['Satoshi', 'sans-serif'],
            body: ['Satoshi', 'sans-serif'],
          },
          colors: {
            gray: {
              50: '#F5F5F7', // Apple System Gray 6
              100: '#E5E5EA', // Apple System Gray 5
              200: '#D1D1D6', // Apple System Gray 4
              300: '#C7C7CC', // Apple System Gray 3
              400: '#AEAEB2', // Apple System Gray 2
              500: '#8E8E93', // Apple System Gray
              800: '#2C2C2E',
              900: '#1C1C1E', // Apple System Black
            },
            brand: {
              navy: '#130c43',
              blue: '#007AFF', // Adjusted to Apple Blue for cleaner look
              cyan: '#06e9eb',
              black: '#000000',
            }
          },
          boxShadow: {
            'apple': '0 4px 24px rgba(0,0,0,0.06)',
            'apple-hover': '0 8px 32px rgba(0,0,0,0.12)',
          },
          backdropBlur: {
            'xs': '2px',
          },
          animation: {
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 0.3s ease-out forwards',
          },
          keyframes: {
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Satoshi', sans-serif;
      background-color: #F5F5F7;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: none;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    input {
      transition: all 0.2s ease;
    }

    /* Custom "Inset" Divider for Lists */
    .inset-divider {
      margin-left: 3rem;
      height: 1px;
      background-color: #E5E5EA;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
